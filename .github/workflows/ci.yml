# CI: install, dependency audit, type check, build, and unit tests
# Runs on push and pull_request (including when PRs are merged via push to target branch).
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

defaults:
  run:
    working-directory: extension

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: extension/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Dependency audit
        run: npm audit --audit-level=high
        # Fails only on high/critical. Moderate devDependency issues (e.g. vite/esbuild dev server) are reported but do not fail the job.

      - name: Type check
        run: npm run check

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm test
