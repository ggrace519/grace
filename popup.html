<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Open WebUI Extension</title>
  <style>
    body {
      width: 200px;
      padding: 8px;
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 13px;
    }
    button {
      display: block;
      width: 100%;
      padding: 10px 12px;
      margin-bottom: 6px;
      border: 1px solid #ccc;
      border-radius: 6px;
      background: #fff;
      cursor: pointer;
      text-align: left;
      font-size: 13px;
    }
    button:hover {
      background: #f5f5f5;
    }
    button:last-child {
      margin-bottom: 0;
    }
  </style>
</head>
<body>
  <button id="open-search">Open search</button>
  <button id="open-sidebar">Open sidebar</button>
  <script src="popup.js"></script>
</body>
</html>
